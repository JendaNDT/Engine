# Uloz jako .github/workflows/build.yml
# NativeAOT NEUMI cross-OS kompilaci -> kazda platforma potrebuje vlastni runner.
name: build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: macos-14          # Apple Silicon runner
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (Native AOT)
        run: dotnet publish src/MiniEngine/MiniEngine.csproj -c Release -r ${{ matrix.rid }} -o out

      - name: Ad-hoc codesign (macOS)
        if: matrix.rid == 'osx-arm64'
        run: |
          # Podepsat je potreba i dylib, ne jen exe.
          codesign --force --sign - out/*.dylib
          codesign --force --sign - --options runtime out/MiniEngine

      - uses: actions/upload-artifact@v4
        with:
          name: MiniEngine-${{ matrix.rid }}
          path: out
